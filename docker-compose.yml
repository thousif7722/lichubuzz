version: '3.9'

services:
  # ── NGINX API Gateway ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: servicehub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - client
    networks:
      - servicehub-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      retries: 3

  # ── Node.js API Server ────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: ../docker/server.Dockerfile
    container_name: servicehub-api
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - servicehub-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  # ── React Frontend ────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: ../docker/client.Dockerfile
    container_name: servicehub-client
    environment:
      - VITE_API_URL=http://api:5000
    networks:
      - servicehub-net
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: servicehub-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-servicehub_redis_pass} --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - servicehub-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB (local dev only — use Atlas in production) ─────────────────────────
  mongo:
    image: mongo:7.0
    container_name: servicehub-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-servicehub_mongo_pass}
      MONGO_INITDB_DATABASE: servicehub
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - servicehub-net
    restart: unless-stopped
    profiles:
      - local  # Only start with --profile local flag

networks:
  servicehub-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local
  mongo-data:
    driver: local
