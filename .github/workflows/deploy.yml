name: ServiceHub CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  AWS_REGION: ap-south-1

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7.0
        ports: ["27017:27017"]
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint server
        working-directory: ./server
        run: npm run lint --if-present

      - name: Lint client
        working-directory: ./client
        run: npm run lint --if-present

      - name: Run server tests
        working-directory: ./server
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/servicehub_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          RAZORPAY_KEY_ID: rzp_test_mock
          RAZORPAY_KEY_SECRET: mock_secret
        run: npm test --if-present

      - name: Build client
        working-directory: ./client
        env:
          VITE_API_URL: https://api.servicehub.in
        run: npm run build

  # ── Build & Push Docker Images ───────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/server.Dockerfile \
            --cache-from $ECR_REGISTRY/servicehub-api:latest \
            -t $ECR_REGISTRY/servicehub-api:$IMAGE_TAG \
            -t $ECR_REGISTRY/servicehub-api:latest \
            ./server
          docker push $ECR_REGISTRY/servicehub-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/servicehub-api:latest

      - name: Build & push Client image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/client.Dockerfile \
            --build-arg VITE_API_URL=https://api.servicehub.in \
            -t $ECR_REGISTRY/servicehub-client:$IMAGE_TAG \
            -t $ECR_REGISTRY/servicehub-client:latest \
            ./client
          docker push $ECR_REGISTRY/servicehub-client:$IMAGE_TAG
          docker push $ECR_REGISTRY/servicehub-client:latest

  # ── Deploy to Production ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS (Blue/Green)
        run: |
          aws ecs update-service \
            --cluster servicehub-prod \
            --service servicehub-api \
            --force-new-deployment \
            --region $AWS_REGION

          aws ecs update-service \
            --cluster servicehub-prod \
            --service servicehub-client \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster servicehub-prod \
            --services servicehub-api servicehub-client \
            --region $AWS_REGION

      - name: Smoke test production
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.servicehub.in/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed! Status: $STATUS"
            exit 1
          fi
          echo "Smoke test passed: $STATUS"

      - name: Notify Slack on success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H "Content-type: application/json" \
            --data '{"text":"✅ ServiceHub deployed successfully to production! Commit: ${{ github.sha }}"}'

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H "Content-type: application/json" \
            --data '{"text":"❌ ServiceHub deployment FAILED! Commit: ${{ github.sha }}"}'
